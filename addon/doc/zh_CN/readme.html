<body>
<h1>文星点显器 NVDA 驱动</h1>
<p>这是文星 / CBP 40 方点显器的 NVDA 驱动。</p>
<p>驱动直接使用 Windows WinUSB 接口，不依赖阳光读屏的 StarLibDriver.dll。</p>
<h2>按键</h2>
<ul>
<li>1 到 40：光标路由键。</li>
<li>左侧外键：上一盲文行。</li>
<li>左侧中键：向后滚动盲文。</li>
<li>左侧内键：跳到浏览顶部。</li>
<li>右侧外键：下一盲文行。</li>
<li>右侧中键：向前滚动盲文。</li>
<li>右侧内键：跳到浏览底部。</li>
</ul>
</body>
</html>
